name: OpenSI-CoSMIC-Infrastructure


services:
  backend:
    container_name: cosmic-infrastructure-fastapi
    depends_on:
      database:
        restart: true
        condition: service_started
        required: true

      gui:
        restart: true
        condition: service_started
        required: true
    restart: unless-stopped
    build:
      context: ./
      dockerfile: ./docker/dockerfiles/fastapi.Dockerfile
    # NOTE:
    # Live mounting for auto reload on dev only. Remove it and the
    # corresponding top-level volume on prod.
    volumes:
      - type: bind
        source: ./
        target: /app
        # NOTE:
        # This makes `.venv` directory container-native at runtime and not
        # trying to bypass the ignore at build time. This's very important when
        # you do the development in Windows.
      - type: volume
        source: cosmic-infrastructure-fastapi-venv
        target: /app/.venv
    # NOTE: For quick debugging (on dev only)
    ports:
      - name: cosmic-infrastructure-fastapi-uvicorn
        target: 8000
        host_ip: 127.0.0.1
        published: "8000"
        protocol: tcp
        app_protocol: http
        mode: host
    networks:
        - cosmic-infrastructure-internal


  database:
    container_name: cosmic-infrastructure-postgres
    restart: unless-stopped
    # Set shared memory limit when using docker compose
    shm_size: 128mb
    secrets:
      - source: cosmic-infrastructure-postgres-user
        target: usr.txt
      - source: cosmic-infrastructure-postgres-database
        target: db.txt
      - source: cosmic-infrastructure-postgres-password
        target: pwd.txt
    environment:
        POSTGRES_USER_FILE: /run/secrets/usr.txt
        POSTGRES_DB_FILE: /run/secrets/db.txt
        POSTGRES_PASSWORD_FILE: /run/secrets/pwd.txt
    build:
      context: ./
      dockerfile: ./docker/dockerfiles/postgres.Dockerfile
    volumes:
      - type: volume
        source: cosmic-infrastructure-postgres-data
        target: /var/lib/postgresql
    networks:
        - cosmic-infrastructure-internal


  gui:
    container_name: cosmic-infrastructure-pgadmin
    restart: unless-stopped
    secrets:
      - source: cosmic-infrastructure-pgadmin-password
        target: pwd.txt
    environment:
        # NOTE: Make sure to enable 2FA for this account on prod
        PGADMIN_DEFAULT_EMAIL: opensi@canberra.edu.au
        PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pwd.txt
    configs:
      - source: cosmic-infrastructure-pgadmin-server
        target: /pgadmin4/servers.json
    build:
      context: ./
      dockerfile: ./docker/dockerfiles/pgadmin.Dockerfile
    volumes:
      - type: volume
        source: cosmic-infrastructure-pgadmin-data
        target: /var/lib/pgadmin
    # NOTE: For quick debugging (on dev only)
    ports:
      - name: cosmic-infrastructure-pgadmin-gunicorn
        target: 80
        host_ip: 127.0.0.1
        published: "5050"
        protocol: tcp
        app_protocol: http
        mode: host
    networks:
        - cosmic-infrastructure-internal


volumes:
  # NOTE: as explained above, define this only in dev (delete on prod).
  cosmic-infrastructure-fastapi-venv:
    name: cosmic-infrastructure-backend-ignore

  # NOTE: data will be stored from the hosting machine rather than inside
  # container due to disadvantage of Docker Overlay2 (on prod only)
  cosmic-infrastructure-postgres-data:
    name: cosmic-infrastructure-relational

  # NOTE: data will be stored from the hosting machine rather than inside
  # container due to disadvantage of Docker Overlay2 (on prod only)
  cosmic-infrastructure-pgadmin-data:
    name: cosmic-infrastructure-gui


networks:
  cosmic-infrastructure-internal:
    name: cosmic_net
    driver: bridge
    external: true


secrets:
  cosmic-infrastructure-postgres-user:
    file: ./docker/secrets/postgres_usr.txt

  cosmic-infrastructure-postgres-database:
    file: ./docker/secrets/postgres_db.txt

  cosmic-infrastructure-postgres-password:
    file: ./docker/secrets/postgres_pwd.txt

  cosmic-infrastructure-pgadmin-password:
    file: ./docker/secrets/pgadmin_pwd.txt


configs:
  cosmic-infrastructure-pgadmin-server:
    file: ./docker/configs/pgadmin_svr.json
