name: CoSMIC

services:
  # TODO: swap to Yarn setup due to FE more used to it
  # frontend:
  #   container_name: cosmic-react
  #   restart: unless-stopped
  #   build:
  #     context: ./
  #     dockerfile: ./docker/dockerfile/react.Dockerfile
  #   ports:
  #     - name: cosmic-vite
  #       target: 5173
  #       host_ip: 127.0.0.1
  #       published: "5174"
  #       protocol: tcp
  #       app_protocol: http
  #       mode: host
  #   networks:
  #       - cosmic-public

  backend:
    container_name: cosmic-fastapi
    restart: unless-stopped
    build:
      context: ./
      dockerfile: ./docker/dockerfile/fastapi.Dockerfile
    # NOTE:
    # Live mounting for auto reload on dev only. Remove it and the
    # corresponding top-level volume on prod.
    volumes:
      - type: bind
        source: ./backend
        target: /app
        # NOTE:
        # This makes `.venv` directory container-native at runtime and not
        # trying to bypass the ignore at build time. This's very important when
        # you do the development in Windows.
      - type: volume
        source: cosmic-fastapi-venv
        target: /app/.venv
    ports:
      - name: cosmic-uvicorn
        target: 8000
        host_ip: 127.0.0.1
        published: "8001"
        protocol: tcp
        app_protocol: http
        mode: host
    networks:
        - cosmic-public
        - cosmic-private

  database:
    container_name: cosmic-postgres
    depends_on:
      backend:
        restart: true
        condition: service_started
        required: true
    restart: unless-stopped
    # Set shared memory limit when using docker compose
    shm_size: 128mb
    secrets:
      - source: cosmic-postgres-user
        target: postgres_user
      - source: cosmic-postgres-db
        target: postgres_db
      - source: cosmic-postgres-password
        target: postgres_password
    environment:
        POSTGRES_USER_FILE: /run/secrets/postgres_user
        POSTGRES_DB_FILE: /run/secrets/postgres_db
        POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    build:
      context: ./
      dockerfile: ./docker/dockerfile/postgres.Dockerfile
    volumes:
      - type: volume
        source: cosmic-postgres-data
        target: /var/lib/postgresql
    # NOTE: Open to quickly connect and debug on dev only
    ports:
      - name: cosmic-postgres-psql
        target: 5432
        host_ip: 127.0.0.1
        published: "5433"
        protocol: tcp
        app_protocol: http
        mode: host
    networks:
        - cosmic-private

  gui:
    container_name: cosmic-pgadmin
    depends_on:
      backend:
        restart: true
        condition: service_started
        required: true
      database:
        restart: true
        condition: service_started
        required: true
    restart: unless-stopped
    secrets:
      - source: cosmic-pgadmin-password
        target: pgadmin_password
    environment:
        # NOTE: Make sure to enable 2FA for this account on prod
        PGADMIN_DEFAULT_EMAIL: opensi@canberra.edu.au
        PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    configs:
      - source: cosmic-pgadmin-server
        target: /pgadmin4/servers.json
    build:
      context: ./
      dockerfile: ./docker/dockerfile/pgadmin.Dockerfile
    volumes:
      - type: volume
        source: cosmic-pgadmin-data
        target: /var/lib/pgadmin
    ports:
      - name: cosmic-pgadmin-gunicorn
        target: 80
        host_ip: 127.0.0.1
        published: "5050"
        protocol: tcp
        app_protocol: http
        mode: host
    networks:
      - cosmic-private

  ollama:
    container_name: cosmic-ollama
    depends_on:
      backend:
        restart: true
        condition: service_started
        required: true
    restart: unless-stopped
    # NOTE:
    # If you've GPU installed on your machine AND it's running Linux/MacOS
    # (this's very important), comment out current Dockerfile and use the
    # following:
    # 1. NVIDIA GPU
    # build:
    #   context: ./
    #   dockerfile: ./docker/dockerfile/ollama/ollama.nvida_cpu.Dockerfile
    # model:
    #   gpus: all
    # 2. AMD GPU
    # build:
    #   context: ./
    #   dockerfile: ./docker/dockerfile/ollama/ollama.amd_cpu.Dockerfile
    # devices:
    #   - "/dev/kfd:/dev/kfd"
    #   - "/dev/dri:/dev/dri"
    # Otherwise, stick with the default as it's guaranteed to run on all OSes.
    # Refer to the documentation if you've any questions:
    # https://docs.ollama.com/docker
    build:
      context: ./
      dockerfile: ./docker/dockerfile/ollama/ollama.all_cpu.Dockerfile
    volumes:
      - type: volume
        source: cosmic-ollama-data
        target: /root/.ollama
    ports:
      - name: cosmic-ollama-serve
        target: 11434
        host_ip: 127.0.0.1
        published: "11435"
        protocol: tcp
        app_protocol: http
        mode: host
    networks:
      - cosmic-private

volumes:
  cosmic-postgres-data:
    name: cosmic-relational
  cosmic-pgadmin-data:
    name: cosmic-gui
  cosmic-ollama-data:
    name: cosmic-slm-provider
  cosmic-fastapi-venv:
    name: cosmic-backend-ignore

networks:
  cosmic-public:
    name: cosmic_net
    driver: bridge
  cosmic-private:
    name: api_cosmic_net
    driver: bridge

secrets:
  cosmic-postgres-user:
    file: ./docker/secret/postgres_user.txt
  cosmic-postgres-db:
    file: ./docker/secret/postgres_db.txt
  cosmic-postgres-password:
    file: ./docker/secret/postgres_password.txt
  cosmic-pgadmin-password:
    file: ./docker/secret/pgadmin_password.txt

configs:
  cosmic-pgadmin-server:
    file: ./docker/config/pgadmin_servers.json
